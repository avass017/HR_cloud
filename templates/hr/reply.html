{% extends "hr/dashhr.html" %}
{% load crispy_forms_tags %}

{% block content %}

<style>

/* ===== PAGE WRAPPER ===== */
.reply-wrapper {
    display: flex;
    justify-content: center;
    padding: 60px 20px;
    background: linear-gradient(to right, #f8fafc, #eef2f7);
}

/* ===== MAIN CARD ===== */
.reply-card {
    background: #ffffff;
    width: 100%;
    max-width: 850px;
    border-radius: 18px;
    padding: 40px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.08);
    animation: fadeIn 0.4s ease-in-out;
}

/* ===== ANIMATION ===== */
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

/* ===== TITLE ===== */
.reply-title {
    font-size: 28px;
    font-weight: 700;
    color: #2563eb;
    margin-bottom: 30px;
    text-align: center;
}

/* ===== COMPLAINT PREVIEW BOX ===== */
.complaint-box {
    background: #f1f5f9;
    padding: 20px;
    border-radius: 12px;
    margin-bottom: 30px;
    border-left: 4px solid #2563eb;
}

.complaint-box h5 {
    font-weight: 600;
    margin-bottom: 10px;
}

.complaint-box p {
    margin: 0;
    color: #475569;
}

/* ===== FORM INPUT STYLING ===== */
input, select, textarea {
    border-radius: 10px !important;
    padding: 12px !important;
    border: 1px solid #d1d5db !important;
}

input:focus, select:focus, textarea:focus {
    border-color: #2563eb !important;
    box-shadow: 0 0 0 3px rgba(37,99,235,0.15) !important;
}

/* ===== BUTTON ===== */
.btn-send {
    background: linear-gradient(135deg, #2563eb, #3b82f6);
    color: #ffffff;
    border: none;
    padding: 12px 35px;
    border-radius: 30px;
    font-weight: 600;
    font-size: 15px;
    transition: all 0.3s ease;
}

.btn-send:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 20px rgba(37,99,235,0.3);
}

/* ===== CENTER BUTTON ===== */
.button-area {
    text-align: center;
    margin-top: 25px;
}

</style>


<div class="reply-wrapper">
    <div class="reply-card">

        <div class="reply-title">
            HR Response Panel
        </div>

        <!-- Complaint Preview -->
        {% if complaint %}
        <div class="complaint-box">
            <h5>Complaint Subject:</h5>
            <p>{{ complaint.subject }}</p>

            <br>

            <h5>Complaint Message:</h5>
            <p>{{ complaint.message }}</p>
        </div>
        {% endif %}

        <!-- Reply Form -->
        <form method="POST">
            {% csrf_token %}
            {{ form|crispy }}

            <div class="button-area">
                <button type="submit" class="btn-send">
                    Send Reply
                </button>
            </div>
        </form>

    </div>
</div>

{% endblock %}
