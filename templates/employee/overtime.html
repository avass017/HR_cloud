{% extends "employee/dashemp.html" %}
{% load crispy_forms_tags %}

{% block content %}
<div class="premium-wrapper">

    <!-- Top Header -->
    <div class="premium-header">
        <div>
            <h2>Overtime Submission</h2>
            <p>Submit your additional working hours </p>
        </div>
        <div class="header-badge">
            Request ID: #OT-{{ request.user.id }}
        </div>
    </div>

    <div class="row g-4">

        <!-- Left Info Panel -->


        <!-- Right Form Panel -->
        <div class="col-lg-8">
            <div class="form-card">
                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}

                    <div class="crispy-premium">
                        {{ form|crispy }}
                    </div>

                    <div class="form-actions">
                        <a href="{% url 'over_view' %}" class="btn-cancel">Cancel</a>
                        <button type="submit" class="btn-submit">
                            Submit Overtime
                        </button>
                    </div>

                </form>
            </div>
        </div>

    </div>
</div>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');

body {
    background: linear-gradient(135deg, #f5f7fa, #e4ecff);
    font-family: 'Poppins', sans-serif;
}

.premium-wrapper {
    max-width: 1300px;
    margin: auto;
    padding: 40px 20px;
}

/* Header */
.premium-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(255,255,255,0.7);
    backdrop-filter: blur(12px);
    padding: 25px 35px;
    border-radius: 20px;
    margin-bottom: 30px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.05);
}

.premium-header h2 {
    font-weight: 700;
    margin-bottom: 5px;
}

.header-badge {
    background: linear-gradient(135deg,#0061ff,#60a5fa);
    color: white;
    padding: 8px 18px;
    border-radius: 30px;
    font-size: 0.85rem;
}

/* Info Card */
.info-card {
    background: white;
    border-radius: 20px;
    padding: 30px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.05);
}

.info-card ul {
    padding-left: 20px;
    margin-bottom: 25px;
}

.highlight-box {
    background: linear-gradient(135deg,#0061ff,#3b82f6);
    color: white;
    padding: 20px;
    border-radius: 15px;
    text-align: center;
}

/* Form Card */
.form-card {
    background: white;
    padding: 40px;
    border-radius: 20px;
    box-shadow: 0 15px 50px rgba(0,0,0,0.05);
}

/* Crispy Styling */
.crispy-premium input,
.crispy-premium select,
.crispy-premium textarea {
    border-radius: 12px !important;
    padding: 12px 15px !important;
    border: 1px solid #e2e8f0 !important;
    transition: all 0.3s ease;
}

.crispy-premium input:focus,
.crispy-premium select:focus,
.crispy-premium textarea:focus {
    border-color: #0061ff !important;
    box-shadow: 0 0 0 4px rgba(0,97,255,0.1) !important;
}

/* Buttons */
.form-actions {
    margin-top: 40px;
    text-align: right;
}

.btn-submit {
    background: linear-gradient(135deg,#0061ff,#3b82f6);
    color: white;
    padding: 12px 35px;
    border-radius: 12px;
    border: none;
    font-weight: 600;
    transition: 0.3s;
}

.btn-submit:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 25px rgba(0,97,255,0.3);
}

.btn-cancel {
    margin-right: 15px;
    text-decoration: none;
    color: #6b7280;
}
</style>

{% endblock %}
