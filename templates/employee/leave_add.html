{% extends "employee/dashemp.html" %}
{% load crispy_forms_tags %}

{% block content %}

<style>

/* ===== CLEAN BACKGROUND ===== */
body,
.content-wrapper,
.main-panel {
    background: #f8fafc !important;
    font-family: "Inter", "Segoe UI", sans-serif;
}

/* ===== WRAPPER ===== */
.complaint-wrapper {
    padding: 60px 20px 80px 20px;
    max-width: 900px;
    margin: 0 auto;
}

/* ===== HEADER ===== */
.page-header {
    margin-bottom: 40px;
}

.page-title {
    font-size: 24px;
    font-weight: 600;
    color: #1e293b;
    margin-bottom: 6px;
}

.page-subtitle {
    font-size: 14px;
    color: #64748b;
    margin: 0;
}

/* ===== FORM CARD ===== */
.form-card {
    background: #ffffff;
    border-radius: 16px;
    padding: 40px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.04);
}

/* ===== FORM SPACING ===== */
.form-card .form-group,
.form-card .mb-3 {
    margin-bottom: 22px !important;
}

/* ===== INPUT STYLING ===== */
input,
select,
textarea {
    border-radius: 10px !important;
    border: 1px solid #e2e8f0 !important;
    padding: 12px !important;
    background-color: #ffffff !important;
    transition: 0.2s ease !important;
}

input:focus,
select:focus,
textarea:focus {
    border-color: #2563eb !important;
    box-shadow: 0 0 0 0.15rem rgba(37,99,235,0.15) !important;
}

/* ===== BUTTON AREA ===== */
.form-actions {
    margin-top: 30px;
    padding-top: 20px;
    border-top: 1px solid #f1f5f9;
    display: flex;
    justify-content: flex-end;
    gap: 12px;
}

/* ===== BUTTONS ===== */
.btn-primary {
    background: #2563eb;
    border: none;
    padding: 8px 22px;
    border-radius: 8px;
    font-weight: 500;
}

.btn-primary:hover {
    background: #1d4ed8;
}

.btn-outline-secondary {
    border-radius: 8px;
    padding: 8px 22px;
}

/* ===== ALERT ===== */
.alert {
    border-radius: 10px;
    font-size: 14px;
    margin-bottom: 25px;
}

@media (max-width: 768px) {
    .complaint-wrapper {
        padding: 40px 15px 60px 15px;
    }

    .form-card {
        padding: 25px;
    }
}

</style>


<div class="complaint-wrapper">

    <!-- HEADER -->
    <div class="page-header">
        <h2 class="page-title">Submit Complaint</h2>
        <p class="page-subtitle">
            Please provide the necessary details below.
        </p>
    </div>

    <!-- FORM CARD -->
    <div class="form-card">

        <!-- Success / Error Messages -->
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            {% endfor %}
        {% endif %}

        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}

            {{ form|crispy }}

            <!-- BUTTONS -->
            <div class="form-actions">
                <a href="{% url 'leave_view' %}"
                   class="btn btn-outline-secondary">
                    Cancel
                </a>

                <button type="submit"
                        class="btn btn-primary">
                    Submit
                </button>
            </div>

        </form>

    </div>

</div>

{% endblock %}
