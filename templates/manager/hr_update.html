{% extends "manager/manager.html" %}
{% load crispy_forms_tags %}

{% block content %}

<style>

/* ================= ENTERPRISE MANAGER FORM ================= */

body {
    background: linear-gradient(135deg, #eef2ff, #f8fafc) !important;
    font-family: 'Inter', sans-serif;
}

/* ===== MAIN CONTAINER ===== */
.manager-container {
    max-width: 950px;
    margin: 60px auto;
    padding: 0 20px;
    animation: fadeUp 0.6s ease;
}

/* ===== HEADER ===== */
.manager-header {
    margin-bottom: 35px;
}

.manager-title {
    font-size: 26px;
    font-weight: 600;
    color: #0f172a;
    margin-bottom: 6px;
}

.manager-subtitle {
    font-size: 14px;
    color: #64748b;
}

/* ===== CARD ===== */
.manager-card {
    background: #ffffff;
    border-radius: 22px;
    padding: 45px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.05);
    position: relative;
    overflow: hidden;
    transition: 0.3s ease;
}

.manager-card:hover {
    box-shadow: 0 25px 70px rgba(0,0,0,0.08);
}

/* Gradient Accent */
.manager-card::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    height: 5px;
    width: 100%;
    background: linear-gradient(90deg, #4f46e5, #3b82f6, #06b6d4);
}

/* ===== FORM FIELDS ===== */
input,
select,
textarea {
    border-radius: 12px !important;
    border: 1px solid #e2e8f0 !important;
    padding: 12px 14px !important;
    font-size: 14px !important;
    transition: all 0.25s ease !important;
}

input:focus,
select:focus,
textarea:focus {
    border-color: #4f46e5 !important;
    box-shadow: 0 0 0 3px rgba(79,70,229,0.12) !important;
}

/* Better spacing between form groups */
.form-group {
    margin-bottom: 22px;
}

/* ===== ACTION BUTTONS ===== */
.form-actions {
    margin-top: 35px;
    padding-top: 25px;
    border-top: 1px solid #f1f5f9;
    display: flex;
    justify-content: flex-end;
    gap: 15px;
}

/* Cancel */
.btn-cancel {
    border-radius: 30px;
    padding: 10px 28px;
    border: 1px solid #cbd5e1;
    background: white;
    color: #475569;
    font-size: 14px;
    transition: 0.3s;
}

.btn-cancel:hover {
    background: #f1f5f9;
}

/* Submit */
.btn-submit {
    border-radius: 30px;
    padding: 10px 32px;
    background: linear-gradient(90deg, #4f46e5, #3b82f6);
    border: none;
    color: white;
    font-size: 14px;
    font-weight: 500;
    transition: 0.3s ease;
}

.btn-submit:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 30px rgba(59,130,246,0.25);
}

/* ===== ANIMATION ===== */
@keyframes fadeUp {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

</style>

<div class="manager-container">

    <!-- HEADER -->
    <div class="manager-header">
        <div class="manager-title">Manager Form</div>
        <div class="manager-subtitle">
            Complete the form below to update or submit information.
        </div>
    </div>

    <!-- CARD -->
    <div class="manager-card">

        <form method="POST">
            {% csrf_token %}

            {{ data|crispy }}

            <div class="form-actions">
                <a href="javascript:history.back()" class="btn-cancel">
                    Cancel
                </a>

                <button type="submit" class="btn-submit">
                    Submit
                </button>
            </div>

        </form>

    </div>

</div>

{% endblock %}
